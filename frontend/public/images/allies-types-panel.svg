<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Les trois types d'allies FAB</title>
  <desc id="desc">Panneau illustrant les trois types d'allies: gardien competent, entretien menage et tutorat.</desc>
  <defs>
